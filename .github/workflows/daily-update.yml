name: Daily Ward Data Update

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: mcr.microsoft.com/playwright/python:v1.44.0-jammy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 google-auth google-auth-httplib2 google-api-python-client playwright==1.44.0

      - name: Run scraper
        env:
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
        run: python scrape.py

      - name: Commit and push updated data
        run: |
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          git config --global --add safe.directory "$(pwd)"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git stash
          git pull --rebase origin main
          git stash pop
          git add data/
          git commit -m "Auto-update ward data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
