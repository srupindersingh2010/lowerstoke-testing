name: Daily Ward Data Update

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC = 08:00 UK time (BST, summer)
    - cron: '0 8 * * *'   # 08:00 UTC = 08:00 UK time (GMT, winter)
  workflow_dispatch:        # Allow manual trigger from GitHub Actions tab

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 google-auth google-auth-httplib2 google-api-python-client playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        env:
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
        run: python scrape.py

   - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add data/
          git diff --staged --quiet || git commit -m "Auto-update ward data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
